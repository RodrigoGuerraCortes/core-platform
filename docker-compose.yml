services:

  app:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: core-platform-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - core-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: core-platform-nginx
    ports:
      - "8010:80"
    volumes:
      - ./backend:/var/www/html
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - core-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: core-platform-postgres
    environment:
      POSTGRES_DB: core_platform
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - core-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: core-platform-redis
    ports:
      - "6380:6379"
    networks:
      - core-network
    restart: unless-stopped

networks:
  core-network:
    driver: bridge

volumes:
  postgres_data:
