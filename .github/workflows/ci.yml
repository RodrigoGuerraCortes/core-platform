name: CI — Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npx eslint src --max-warnings=0

      - name: Type check
        run: npx vue-tsc --noEmit
        continue-on-error: true  # Allow type errors during initial build-out

      - name: Unit tests
        run: npx vitest run

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testing
          MYSQL_DATABASE: core_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: core_platform_test
      DB_USERNAME: root
      DB_PASSWORD: testing
      APP_KEY: base64:dGVzdGluZ2tleXRoYXRpczMyYnl0ZXNsb25n
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f infra/docker/frontend.Dockerfile -t core-platform-frontend:ci .

      - name: Validate frontend image
        run: docker run --rm core-platform-frontend:ci ls /usr/share/nginx/html/index.html
