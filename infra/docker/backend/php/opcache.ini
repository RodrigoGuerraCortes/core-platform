; ------------------------------------------------------------------
; Core Platform — OPcache configuration (development)
;
; revalidate_freq=0 + validate_timestamps=1 means PHP checks mtime
; on every request, so code changes are picked up instantly.
; In production set validate_timestamps=0 for maximum throughput.
; ------------------------------------------------------------------
[opcache]
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.enable_cli=0
