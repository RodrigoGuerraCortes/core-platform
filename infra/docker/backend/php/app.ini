; ------------------------------------------------------------------
; Core Platform — PHP runtime overrides
; ------------------------------------------------------------------
[PHP]
; Allow larger file uploads (e.g. Filament media library)
upload_max_filesize = 64M
post_max_size       = 64M

; Enough headroom for Filament + Telescope in dev
memory_limit        = 256M

; Reasonable per-request timeout (use queues for long work)
max_execution_time  = 60
max_input_time      = 60

; Display errors to stderr in dev; nginx/docker logs will capture them
log_errors          = On
error_log           = /proc/self/fd/2
